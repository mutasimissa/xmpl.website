name: Preview & E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-website:
    name: Check Website Exists
    runs-on: ubuntu-latest
    outputs:
      has-website: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [ -f website/deno.json ] || [ -f website/fresh.config.ts ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-preview:
    name: Build Preview
    needs: check-website
    if: needs.check-website.outputs.has-website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install workspace dependencies
        run: deno install

      - name: Install website dependencies
        run: cd website && deno install

      - name: Build website
        run: cd website && deno task build

      - uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: website/_fresh/
          retention-days: 3

  e2e-tests:
    name: E2E Tests
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: deno install

      - name: Install website dependencies
        run: cd website && deno install

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Start dev server
        run: cd website && deno task start &

      - name: Wait for server
        run: npx wait-on http://localhost:8000 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --config tests/e2e/playwright.config.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  broken-links:
    name: Broken Link Check
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install workspace dependencies
        run: deno install

      - name: Install website dependencies
        run: cd website && deno install

      - name: Start dev server
        run: cd website && deno task start &

      - name: Wait for server
        run: npx wait-on http://localhost:8000 --timeout 30000

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --base http://localhost:8000 --no-progress --exclude-mail http://localhost:8000
          fail: true

  lighthouse:
    name: Lighthouse CI
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: deno install

      - name: Install website dependencies
        run: cd website && deno install

      - name: Start dev server
        run: cd website && deno task start &

      - name: Wait for server
        run: npx wait-on http://localhost:8000 --timeout 30000

      - name: Generate Lighthouse URLs
        run: deno run --allow-read --allow-write tests/ci/lighthouse-urls.ts

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse/lighthouserc.json
          uploadArtifacts: true

  visual-diff:
    name: Visual Diff
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: deno install

      - name: Install website dependencies
        run: cd website && deno install

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Start dev server
        run: cd website && deno task start &

      - name: Wait for server
        run: npx wait-on http://localhost:8000 --timeout 30000

      - name: Capture snapshots
        run: npx playwright test --config tests/e2e/playwright.config.ts --grep @snapshot
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: tests/e2e/test-results/
          retention-days: 7

  pr-report:
    name: PR Summary
    needs: [e2e-tests, broken-links, lighthouse]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const e2e = '${{ needs.e2e-tests.result }}';
            const links = '${{ needs.broken-links.result }}';
            const lh = '${{ needs.lighthouse.result }}';
            const icon = (r) => r === 'success' ? ':white_check_mark:' : r === 'skipped' ? ':fast_forward:' : ':x:';
            const body = [
              '## Preview Build Report',
              '',
              `| Check | Status |`,
              `|-------|--------|`,
              `| E2E Tests | ${icon(e2e)} ${e2e} |`,
              `| Broken Links | ${icon(links)} ${links} |`,
              `| Lighthouse | ${icon(lh)} ${lh} |`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
